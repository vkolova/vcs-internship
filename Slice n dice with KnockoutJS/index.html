<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>momentum</title>

    <script type='text/javascript' src='js/knockout-3.4.1.js'></script>
    <link rel="stylesheet" href="css/styles.css">
  </head>

  <body>
    <div class="container">
      <header>
        <div class="navbar">
          <div class="brand-image">
            m
          </div>

          <span class="web">@momentumhq</span>

          <div class="navigation">
            <ul data-bind="foreach: navigation">
              <li><a href="#" data-bind="text: $data" ></a></li>
            </ul>
          </div>
          </div>

          <section class="hero">

            <div class="hero-content">
              <h1>momentum</h1>
              <p>We are a small but perfectly formed <strong>web design studio</strong>.</p>
            </div>
          </section>

        </header>


      <section class="intro" data-bind="foreach: intro">
        <div class="intro-content">
          <h5 data-bind="text: h"></h5>
          <span class="icon">&#xf138;</span>
          <p data-bind="text: p"></p>
        </div>
      </section>

      <section class="feature-list">
        <img src="images/mobile.png" alt="mobile">

        <div class="features">

            <div class="feature-content" data-bind="foreach: features">
              <span class="icon" data-bind="text: icon"></span>
              <h5 data-bind="text: h"></h5>
              <p data-bind="text: p"></p>
            </div>

            <button type="button" name="button">Read more</button>
        </div>
      </section>

    </div>

    <div class="footer">
      <span class="copyright">&#xA9; 2016 momentum studios</span>

      <div class="support">
        <span>We support:</span>
        <img src="images/firstsite.png" alt="firstsite">
        <img src="images/openroad.jpg" alt="openroad">
      </div>
    </div>

    <script src="js/index.js"></script>

  </body>
</html>
